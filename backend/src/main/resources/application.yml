spring:
  application:
    name: mindmate
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mindmate}
    username: ${DATABASE_USERNAME:mindmate}
    password: ${DATABASE_PASSWORD:mindmate}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

mindmate:
  jwt-secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
  gemini-api-key: ${GEMINI_API_KEY:}
  gemini-model: ${GEMINI_MODEL:gemini-2.5-pro}
  app-env: ${APP_ENV:dev}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  sentry-dsn: ${SENTRY_DSN:}

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-none}]"
