services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mindmate
      POSTGRES_USER: mindmate
      POSTGRES_PASSWORD: mindmate
    ports:
      - "5432:5432"
    volumes:
      - mindmate_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmate -d mindmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/mindmate
      DATABASE_USERNAME: mindmate
      DATABASE_PASSWORD: mindmate
      JWT_SECRET: change-this-development-secret-change-this-development-secret
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_ENV: dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mindmate_pg:
